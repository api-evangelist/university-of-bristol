reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      Bristol has no single centralized developer portal. Its strongest, verifiable
      public API surface is research-oriented: the Bristol Research Portal (Elsevier
      Pure) serves a live OpenAPI 3.0.1 REST API and a live OAI-PMH 2.0 endpoint
      (repository name "University of Bristol Open Access Interface Repository"),
      both confirmed returning 200 during review. data.bris is a confirmed open
      research data repository with DataCite DOIs, but its standard CKAN API paths
      returned 404, so no machine API endpoint was catalogued for it. Department
      GitHub orgs (uob-hpc, cs-uob) are real and live but publish source code rather
      than institutional APIs. No public status page resolved. No endpoints were
      fabricated; only live-verified URLs are catalogued.
