---
aid: university-of-bristol
name: University of Bristol
description: >-
  The University of Bristol is a public research university in Bristol, United
  Kingdom, ranked #58 in the QS World University Rankings 2025. Its public
  developer/API footprint is research-oriented rather than a centralized
  developer portal: the Bristol Research Portal (Pure, by Elsevier) exposes a
  documented REST API and an OAI-PMH 2.0 interface over its open-access research
  outputs, and data.bris is the institution's open research data repository with
  DataCite DOIs. Department-level engineering groups (notably HPC and Computer
  Science) publish open-source code on GitHub, but the university does not
  operate a single unified institutional API/developer program.
