  - aid: university-of-bristol:data-bris
    name: data.bris Research Data Repository
    description: >-
      data.bris is the University of Bristol's open research data repository,
      providing public access to multidisciplinary research datasets. Datasets
      are issued British Library DataCite DOIs and the majority are openly
      downloadable. A unified, publicly documented machine API was not confirmed
      live during review; the repository is primarily a web-based discovery and
      download service with DataCite DOI integration.
    humanURL: https://data.bris.ac.uk/data/
    tags: [ Research Data, Open Data, Repository, DataCite, DOI ]
